global:
  wizApiToken:
    clientId: "${wiz_k8s_integration_client_id}"
    clientToken: "${wiz_k8s_integration_client_secret}"
    clientEndpoint: "${wiz_k8s_integration_client_endpoint}"

wiz-admission-controller:
  enabled: ${use_wiz_admission_controller}
  # Avoid running uninstall hook Jobs (can fail to pull images and block destroy).
  wizUninstallJob:
    enabled: false
  # Avoid creating webhook resources as Helm hooks (less brittle during CI / destroy).
  webhook:
    useHelmHooks: false

wiz-kubernetes-connector:
  enabled: true
  broker:
    enabled: true
  autoCreateConnector:
    connectorName: "${kubernetes_connector_name}"
    clusterFlavor: "${cluster_type}"
    # Disable delete-connector hook job on uninstall: it can hang and block
    # `terraform destroy`. Clean up connectors in Wiz separately if needed.
    autoDeleteConnectorEnabled: false
    useJobTTL: true

wiz-sensor:
  enabled: ${use_wiz_sensor}
  imagePullSecret:
    username: "${wiz_sensor_pull_username}"
    password: "${wiz_sensor_pull_password}"
  apiSecurity:
    enabled: true
  forensics:
    enabled: true
  daemonset:
    sensorHostCacheCreate: true
    sensorHostCacheFolder: /var/lib/wiz/
    tolerations:
      - operator: Exists
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/os
                  operator: In
                  values:
                    - linux
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - arm64
                    - amd64
                - key: eks.amazonaws.com/compute-type
                  operator: NotIn
                  values:
                    - fargate
